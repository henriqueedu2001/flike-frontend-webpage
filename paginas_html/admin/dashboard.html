<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CAUSP-LOCK</title>
    <style>
        :root { --primary: #2c3e50; --bg: #f4f7f9; --sidebar-width: 260px; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); }
        
        /* Sidebar & Header (Padrão) */
        nav { width: 0; background: var(--primary); color: white; height: 100vh; position: fixed; z-index: 1000; transition: 0.3s; overflow-x: hidden; }
        .nav-header { padding: 30px 20px; background: rgba(0,0,0,0.2); }
        .nav-links a { padding: 15px 25px; color: rgba(255,255,255,0.8); text-decoration: none; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; align-items: center; width: 100%; position: sticky; top: 0; z-index: 500; }
        
        /* Dashboard Specific */
        main { flex: 1; padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 0.85rem; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .chart-placeholder { background: white; border-radius: 12px; height: 300px; display: flex; align-items: center; justify-content: center; color: #999; border: 2px dashed #ddd; }
        
        .overlay { display: none; position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="closeNav()"></div>
    <nav id="mySidebar">
        <div class="nav-header"><strong>CAUSP Admin</strong></div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="usuarios.html">👥 Usuários</a>
            <a href="predios.html">🏛️ Prédios</a>
            <a href="logs.html">🔑 Chaves Antigas</a>
            <a href="config.html">⚙️ Config</a>
        </div>
    </nav>
    <main>
        <header style="margin: -30px -30px 30px -30px;">
            <div onclick="openNav()" style="cursor:pointer; font-size:24px; margin-right:20px">☰</div>
            <h1 style="font-size:1.2rem; margin:0">Dashboard Geral</h1>
        </header>
        <div class="stats-grid">
            <div class="stat-card"><h3>Acessos Hoje</h3><p>42</p></div>
            <div class="stat-card" style="border-left-color: var(--success)"><h3>Status Sistema</h3><p>ONLINE</p></div>
            <div class="stat-card" style="border-left-color: var(--danger)"><h3>Alertas</h3><p>1</p></div>
        </div>
        <div class="chart-placeholder">Visualização de Fluxo Semanal (Gráfico)</div>
    </main>
    <script>
        function openNav() { document.getElementById("mySidebar").style.width = "260px"; document.getElementById("overlay").style.display = "block"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; document.getElementById("overlay").style.display = "none"; }
    </script>
</body>
</html>
