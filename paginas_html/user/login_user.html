<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CAUSP-LOCK SanFran</title>
    <style>
        :root {
            --sanfran-gold: #c5a059;
            --causp-blue: #2c3e50;
            --soft-bg: #fdfdfd;
            --input-border: #ced4da;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 6px solid var(--causp-blue);
        }

        .logo-placeholder {
            margin-bottom: 20px;
        }

        .logo-placeholder h1 {
            font-size: 1.5rem;
            color: var(--causp-blue);
            margin: 0;
            letter-spacing: 1px;
        }

        .logo-placeholder p {
            font-size: 0.85rem;
            color: var(--sanfran-gold);
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }

        h2 {
            font-weight: 500;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: var(--causp-blue);
            background: #fff;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: var(--causp-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #154360;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--causp-blue);
            text-decoration: none;
        }

        .help-text {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #999;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-placeholder">
        <h1>CAUSP-LOCK</h1>
        <p>Faculdade de Direito USP</p>
    </div>

    <h2>Bem-vinda(o) à Sala de Apoio</h2>

    <form>
        <div class="input-group">
            <label for="email">E-mail Institucional (@usp.br)</label>
            <input type="email" id="email" placeholder="seuemail@usp.br" required>
        </div>

        <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">ENTRAR</button>
    </form>

    <div class="footer-links">
        <a href="#">Esqueci minha senha</a> • <a href="#">Solicitar Cadastro</a>
    </div>

    <p class="help-text">
        Este é um espaço seguro. Caso tenha dificuldades com o acesso, procure a portaria do 3º andar.
    </p>
</div>

</body>
</html>
