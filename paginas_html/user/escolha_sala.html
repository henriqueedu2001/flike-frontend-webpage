<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAUSP-LOCK | Seleção de Acesso</title>
    <style>
        :root {
            --usp-blue: #2c3e50;
            --soft-blue: #e8f0fe;
            --text-dark: #2c3e50;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Menu Lateral --- */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1000;
            top: 0; left: 0; background-color: white; transition: 0.3s;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-x: hidden;
        }
        .sidebar-header { padding: 30px 20px; background: var(--usp-blue); color: white; }
        .sidebar a { padding: 15px 25px; text-decoration: none; color: var(--text-dark); display: block; border-bottom: 1px solid #f0f0f0; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; color: white; cursor: pointer; }

        /* --- Layout --- */
        header { background: var(--usp-blue); color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        .container { width: 90%; max-width: 500px; margin: 20px auto; }
        
        .breadcrumb { font-size: 0.85rem; color: #666; margin-bottom: 15px; display: none; }
        
        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--text-dark); }

        /* --- Cards --- */
        .selection-list { display: flex; flex-direction: column; gap: 12px; }
        
        .card {
            background: white; border-radius: 12px; padding: 16px;
            display: flex; align-items: center; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent;
            transition: 0.2s;
        }
        .card:hover { border-color: var(--usp-blue); background: var(--soft-blue); }
        .icon { font-size: 1.5rem; margin-right: 15px; }
        .card-content h3 { margin: 0; font-size: 1rem; color: var(--usp-blue); }
        .card-content p { margin: 3px 0 0; font-size: 0.85rem; color: #666; }

        .btn-back {
            background: none; border: none; color: var(--usp-blue);
            cursor: pointer; font-weight: bold; margin-bottom: 15px; display: none;
            align-items: center; gap: 5px;
        }

        .overlay { display: none; position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; top: 0; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeNav()"></div>

<nav id="mySidebar" class="sidebar">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <div class="sidebar-header"><strong>Henrique S. Souza</strong><br><small>CAUSP</small></div>
    <a href="index.html">🏠 Início</a>
    <a href="#">🔑 Minhas Chaves</a>
    <a href="#">📖 Instruções</a>
    <a href="#" style="color: #e74c3c;">🚪 Sair</a>
</nav>

<header>
    <div onclick="openNav()" style="cursor:pointer; font-size: 24px;">☰</div>
    <h1 style="margin: 0; font-size: 1.1rem;">CAUSP-LOCK</h1>
</header>

<div class="container">
    <button id="btnBack" class="btn-back" onclick="resetSelection()">← Voltar aos Prédios</button>
    <div id="breadcrumb" class="breadcrumb">Prédio Histórico</div>
    <h2 id="mainTitle">Em qual prédio você está?</h2>

    <div id="selectionList" class="selection-list">
        <div class="card" onclick="showRooms('Prédio Histórico')">
            <div class="icon">🏛️</div>
            <div class="card-content">
                <h3>Prédio Histórico (Arcadas)</h3>
                <p>Largo de São Francisco</p>
            </div>
        </div>
        <div class="card" onclick="showRooms('Edifício Paula Souza')">
            <div class="icon">🏢</div>
            <div class="card-content">
                <h3>Edifício Paula Souza</h3>
                <p>Centro - USP</p>
            </div>
        </div>
    </div>
</div>

<script>
    const list = document.getElementById('selectionList');
    const title = document.getElementById('mainTitle');
    const btnBack = document.getElementById('btnBack');
    const breadcrumb = document.getElementById('breadcrumb');

    function showRooms(buildingName) {
        title.innerText = "Escolha a sala:";
        breadcrumb.innerText = buildingName;
        breadcrumb.style.display = "block";
        btnBack.style.display = "flex";
        
        list.innerHTML = `
            <div class="card" onclick="generateQR()">
                <div class="icon">🍼</div>
                <div class="card-content">
                    <h3>Apoio à Amamentação</h3>
                    <p>3º Andar - Corredor Central</p>
                </div>
            </div>
            <div class="card" onclick="generateQR()">
                <div class="icon">🧘</div>
                <div class="card-content">
                    <h3>Regulação Sensorial</h3>
                    <p>3º Andar - Sala 302</p>
                </div>
            </div>
        `;
    }

    function resetSelection() {
        location.reload(); // Simples para resetar o estado
    }

    function generateQR() {
        alert("Gerando QR Code assinado... Aguarde.");
        // Redirecionamento para a tela do QR Code final
    }

    function openNav() { document.getElementById("mySidebar").style.width = "280px"; document.getElementById("overlay").style.display = "block"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; document.getElementById("overlay").style.display = "none"; }
</script>

</body>
</html>
